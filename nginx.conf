server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/tts/ {
        proxy_pass https://narrator-tts.linkzy.dev/;
        proxy_set_header X-API-Key "${TTS_API_KEY}";
        proxy_ssl_server_name on;
        proxy_set_header Host "narrator-tts.linkzy.dev";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
